{% extends "base.html" %}

{% block content %}
<div class="card border-0 shadow-sm mt-4">
    <div class="card-body">
        <h5 class="card-title mb-4">歷史紀錄與檢索</h5>
        
        <!-- Filter Form -->
        <form class="row g-3 mb-4 bg-light p-3 rounded" method="GET" action="/history">
            <div class="col-md-3">
                <label class="form-label text-muted small">開始日期</label>
                <input type="date" class="form-control border-0" name="start" value="{{ request.args.get('start', '') }}">
            </div>
            <div class="col-md-3">
                <label class="form-label text-muted small">結束日期</label>
                <input type="date" class="form-control border-0" name="end" value="{{ request.args.get('end', '') }}">
            </div>
            <div class="col-md-4">
                <label class="form-label text-muted small">關鍵字</label>
                <input type="text" class="form-control border-0" name="keyword" placeholder="分類或備註..." value="{{ request.args.get('keyword', '') }}">
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-primary w-100">篩選</button>
            </div>
        </form>

        <!-- Data Table -->
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>日期</th>
                        <th>類型</th>
                        <th>分類</th>
                        <th>金額</th>
                        <th>備註</th>
                        <th class="text-end">操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for t in transactions %}
                    <tr id="row-{{ t.id }}">
                        <td class="text-muted">{{ t.date }}</td>
                        <td>
                            {% if t.type == 'expense' %}
                            <span class="badge bg-danger bg-opacity-10 text-danger px-2 py-1">支出</span>
                            {% else %}
                            <span class="badge bg-success bg-opacity-10 text-success px-2 py-1">收入</span>
                            {% endif %}
                        </td>
                        <td>{{ t.category }}</td>
                        <td class="fw-bold {% if t.type == 'expense' %}text-danger{% else %}text-success{% endif %}">
                            ${{ t.amount }}
                        </td>
                        <td class="text-muted">{{ t.description }}</td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-outline-danger delete-btn" data-id="{{ t.id }}">刪除</button>
                        </td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="6" class="text-center py-4 text-muted">無符合的紀錄</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
