{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm mt-4">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <button class="btn btn-outline-secondary rounded-pill px-3" id="prevMonth">&lt; 上個月</button>
                    <h4 class="card-title m-0 fw-bold" id="currentMonthLabel"></h4>
                    <button class="btn btn-outline-secondary rounded-pill px-3" id="nextMonth">下個月 &gt;</button>
                </div>
                
                <div class="calendar-header grid-7-cols text-center fw-medium text-muted mb-2">
                    <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
                </div>
                
                <div class="calendar-grid grid-7-cols gap-2" id="calendarBody">
                    <!-- Days will be generated by JS -->
                </div>
                
                <div class="mt-4 pt-3 border-top d-flex justify-content-center gap-4 text-muted small">
                    <div class="d-flex align-items-center gap-2">
                        <div class="color-box bg-white border rounded" style="width: 16px; height: 16px;"></div> 0
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <div class="color-box bg-spend-low rounded" style="width: 16px; height: 16px;"></div> 1 - 300
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <div class="color-box bg-spend-mid rounded" style="width: 16px; height: 16px;"></div> 301 - 1000
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <div class="color-box bg-spend-high rounded" style="width: 16px; height: 16px;"></div> 1000+
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        let currentDate = new Date();
        
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth(); // 0-11
            const monthStr = `${year}-${String(month + 1).padStart(2, '0')}`;
            
            document.getElementById('currentMonthLabel').textContent = `${year}年 ${month + 1}月`;
            
            // Fetch data for the month
            fetch(`/api/calendar-data?month=${monthStr}`)
                .then(res => res.json())
                .then(data => {
                    const calendarBody = document.getElementById('calendarBody');
                    calendarBody.innerHTML = '';
                    
                    const firstDay = new Date(year, month, 1).getDay();
                    const daysInMonth = new Date(year, month + 1, 0).getDate();
                    
                    // Empty slots for days before first day of month
                    for (let i = 0; i < firstDay; i++) {
                        calendarBody.innerHTML += `<div class="calendar-day empty"></div>`;
                    }
                    
                    // Days of month
                    for (let d = 1; d <= daysInMonth; d++) {
                        const dateStr = `${monthStr}-${String(d).padStart(2, '0')}`;
                        const total = data[dateStr] || 0;
                        
                        let colorClass = 'bg-white border border-light';
                        if (total > 1000) colorClass = 'bg-spend-high text-white shadow-sm border-0';
                        else if (total > 300) colorClass = 'bg-spend-mid shadow-sm border-0';
                        else if (total > 0) colorClass = 'bg-spend-low shadow-sm border-0';
                        
                        const amountHtml = total > 0 ? `<div class="calendar-amount small mt-2 fw-bold opacity-75">$${total}</div>` : '';
                        
                        calendarBody.innerHTML += `
                            <div class="calendar-day rounded p-2 d-flex flex-column justify-content-between align-items-center ${colorClass}" style="min-height: 80px; transition: all 0.2s;">
                                <div class="fw-medium text-secondary w-100 text-start">${d}</div>
                                ${amountHtml}
                            </div>
                        `;
                    }
                });
        }
        
        document.getElementById('prevMonth').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });
        
        document.getElementById('nextMonth').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });
        
        renderCalendar();
    });
</script>
{% endblock %}
